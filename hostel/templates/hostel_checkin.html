{% extends 'base.html' %}
{% block content %}
<div class="container">
  <br/>
  <div class="card mb-3">
    <div class="row g-0">
      <div class="col-md-12">
      <form method="POST" enctype="multipart/form-data" action="{% url 'checkin' %}">
          {% csrf_token %}
          {{ form.as_p }}
          <br/><br/>
          <button type="submit" class="btn btn-secondary">Submit</button>
      </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
