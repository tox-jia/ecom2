<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
        <link href="{% static 'css/styles_customized.css' %}" rel="stylesheet" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    </head>
    <body>
{% load custom_tags %}
<div class="container">
  <div class="row g-3">
    <div class="col-6"><h1>{{ guest.givenname }} {{ guest.surname }}</h1></div>
    <div class="col-3">{{ guest.country }}</div>
    <div class="col-3">{{ guest.platform }}.com</div>
  </div>
  <hr>
  <div class="row g-3">
    {% for term in terms %}
    <div class="col-3">
    {{ term.question }} <br>
    << {{ answers|get_item:term.id|stringformat:"s" }} >>
    </div>
    {% endfor %}
  </div>
  <hr>
  <div class="row g-3">
    <div class="col-12">
      <img src="{{ guest.passport.url }}" width="100%">
    </div>
  </div>
</div>

</body>
</html>
