{% block content %}

<script>
function resetRooms() {

        <div class="col-2 text-center border-end">Clean</div>

    <!-- Rooms -->

    <div class="row">
    {% for r in rooms1 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button
                class="btn toggle-out
                    {% if r.out %}
                        btn-danger
                    {% elif r.is_extend %}
                        btn-prep
                    {% else %}
                        btn-secondary
                    {% endif %}"
                data-id="{{ r.id }}">
                {{ r.name }}
            </button>
        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">
            <button
                class="btn toggle-key
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.key %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                Key
            </button>
        </div>

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button
                class="btn toggle-clean
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.is_clean %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                OK
            </button>
        </div>


    {% empty %}
        <p>No rooms found.</p>
    {% endfor %}
        </div>

  <hr>
  <!-- Rooms -->

    <div class="row">
    {% for r in rooms2 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button

                class="btn toggle-out {% if r.out %}btn-danger{% else %}btn-secondary {% endif %}"
                data-id="{{ r.id }}">
                {{ r.name }}
            </button>
        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">
            <button
                class="btn toggle-key
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.key %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                Key
            </button>
        </div>

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button
                class="btn toggle-clean
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.is_clean %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                OK
            </button>
        </div>


    {% empty %}
        <p>No rooms found.</p>
    {% endfor %}
        </div>

  <hr>

  <!-- Rooms -->

    <div class="row">
    {% for r in rooms3 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button
                class="btn toggle-out {% if r.out %}btn-danger{% else %}btn-secondary {% endif %}"
                data-id="{{ r.id }}">
                {{ r.name }}
            </button>
        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">
            <button
                class="btn toggle-key
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.key %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                Key
            </button>
        </div>

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button
                class="btn toggle-clean
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.is_clean %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                OK
            </button>
        </div>


    {% empty %}
        <p>No rooms found.</p>
    {% endfor %}
        </div>

    <hr>

    <div class="col-12 text-center mb-2">
            <button class="btn btn-primary" onclick="resetRooms()">
                Reset
            </button>
        </div>


</div>

<script>
// --- RESET ALL ROOMS ---
function resetRooms() {
    fetch("{% url 'reset_rooms' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}"
        }
    })
    .then(res => res.json())
    .then(data => {
        location.reload();
    });
}


// --- SEND UPDATE TO BACKEND ---
function sendUpdate(id, field) {
    return fetch("{% url 'update_room' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            id: id,
            field: field
        })
    })
    .then(response => response.json());
}


// --- ENABLE / DISABLE KEY & CLEAN ---
function updateButtonsUI(roomId, isActive) {
    const keyBtn = document.querySelector(`.toggle-key[data-id="${roomId}"]`);
    const cleanBtn = document.querySelector(`.toggle-clean[data-id="${roomId}"]`);

    if (!keyBtn || !cleanBtn) return;

    if (isActive) {
        // ENABLE
        keyBtn.classList.remove("disabled", "btn-secondary");
        keyBtn.classList.add("btn-outline-success");

        cleanBtn.classList.remove("disabled", "btn-secondary");
        cleanBtn.classList.add("btn-outline-success");

    } else {
        // DISABLE + RESET
        keyBtn.classList.add("disabled");
        keyBtn.classList.remove("btn-outline-success", "btn-success");
        keyBtn.classList.add("btn-secondary");

        cleanBtn.classList.add("disabled");
        cleanBtn.classList.remove("btn-outline-success", "btn-success");
        cleanBtn.classList.add("btn-secondary");
    }
}


// --- ROOM BUTTON (3 STATES) ---
document.querySelectorAll(".toggle-out").forEach(btn => {

    // initial state from Django
    if (btn.classList.contains("btn-danger")) {
        btn.dataset.state = "on";
    } else if (btn.classList.contains("btn-prep")) {
        btn.dataset.state = "prep";
    } else {
        btn.dataset.state = "off";
    }

    btn.addEventListener("click", function() {
        let state = this.dataset.state;
        const roomId = this.dataset.id;

        if (state === "off") {
            // OFF → PREP (extend)
            this.classList.remove("btn-secondary");
            this.classList.add("btn-prep");
            this.dataset.state = "prep";

            sendUpdate(roomId, "extend");   // ✅ NEW

        } else if (state === "prep") {
            // PREP → ON (checkout)
            this.classList.remove("btn-prep");
            this.classList.add("btn-danger");
            this.dataset.state = "on";

            sendUpdate(roomId, "out");      // ✅ existing
            updateButtonsUI(roomId, true);

        } else if (state === "on") {
            // ON → OFF (reset)
            this.classList.remove("btn-danger");
            this.classList.add("btn-secondary");
            this.dataset.state = "off";

            sendUpdate(roomId, "off");      // ✅ NEW
            updateButtonsUI(roomId, false);
        }
    });
});


// --- KEY BUTTON ---
document.querySelectorAll(".toggle-key").forEach(btn => {
    btn.addEventListener("click", function() {
        if (this.classList.contains("disabled")) return;

        const roomId = this.dataset.id;

        sendUpdate(roomId, "key").then(() => {
            this.classList.toggle("btn-success");
            this.classList.toggle("btn-outline-success");
        });
    });
});


// --- CLEAN BUTTON ---
document.querySelectorAll(".toggle-clean").forEach(btn => {
    btn.addEventListener("click", function() {
        if (this.classList.contains("disabled")) return;

        const roomId = this.dataset.id;

        sendUpdate(roomId, "clean").then(() => {
            this.classList.toggle("btn-success");
            this.classList.toggle("btn-outline-success");
        });
    });
});
</script>

{% endblock %}
