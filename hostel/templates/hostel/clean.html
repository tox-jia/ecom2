{% extends 'hostel/h_base.html' %}
{% block content %}
<style>
.btn{
    font-size:12px;
    width: 56px;
}
</style>

<script>
function resetRooms() {


    fetch("{% url 'reset_rooms' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}"
        }
    })
    .then(res => res.json())
    .then(data => {
        location.reload();
    });
}
</script>

<div class="container mt-2">

    <!-- Header
    <div class="row fw-bold mb-2">

        <div class="col-2 text-center">Room</div>
        <div class="col-2 text-center">Key</div>
        <div class="col-2 text-center border-end">Clean</div>
        <div class="col-2 text-center">Room</div>
        <div class="col-2 text-center">Key</div>
        <div class="col-2 text-center border-end">Clean</div>
    </div> -->

    <!-- Rooms -->

    <div class="row">
    {% for r in rooms1 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button
                class="btn toggle-out {% if r.out %}btn-danger{% else %}btn-secondary {% endif %}"
                data-id="{{ r.id }}">
                {{ r.name }}
            </button>
        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">
            <button
                class="btn toggle-key
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.key %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                Key
            </button>
        </div>

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button
                class="btn toggle-clean
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.is_clean %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                OK
            </button>
        </div>


    {% empty %}
        <p>No rooms found.</p>
    {% endfor %}
        </div>

  <hr>
  <!-- Rooms -->

    <div class="row">
    {% for r in rooms2 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button

                class="btn toggle-out {% if r.out %}btn-danger{% else %}btn-secondary {% endif %}"
                data-id="{{ r.id }}">

        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">

                {% elif r.key %}

                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                Key
            </button>
        </div>

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button
                class="btn toggle-clean
                {% if not r.out %}
                    btn-secondary disabled
                {% elif r.is_clean %}
                    btn-success
                {% else %}
                    btn-outline-success
                {% endif %}"
                data-id="{{ r.id }}">
                OK
            </button>
        </div>


    {% empty %}
        <p>No rooms found.</p>
    {% endfor %}
        </div>

  <hr>

  <!-- Rooms -->

    <div class="row">
    {% for r in rooms3 %}
        <!-- ROOM (OUT toggle) -->
        <div class="col-2 m-0 p-0 mb-2 text-start ps-2">
            <button
                class="btn toggle-out {% if r.out %}btn-danger{% else %}btn-secondary {% endif %}"

        </div>

        <!-- KEY -->
        <div class="col-2 m-0 p-0 text-start ps-2 mb-2">

                    btn-secondary disabled

                    btn-success

        <!-- CLEAN -->
        <div class="col-2 m-0 p-0 ps-1 text-start border-end mb-2">
            <button

                    btn-secondary disabled
                {% elif r.is_clean %}

    {% empty %}

        </div>

    <hr>

    <div class="col-12 text-center mb-2">
            <button class="btn btn-primary" onclick="resetRooms()">
                Reset
            </button>
        </div>


</div>


<script>
// ✅ AJAX function
function sendUpdate(id, field) {
    fetch("{% url 'update_room' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            id: id,
            field: field
        })
    })
    .then(response => response.json())
    .then(data => {
        location.reload();  // simple version (works reliably)
    });
}

// OUT button
document.querySelectorAll(".toggle-out").forEach(btn => {
    btn.addEventListener("click", function() {
        sendUpdate(this.dataset.id, "out");
    });
});

// KEY button
document.querySelectorAll(".toggle-key").forEach(btn => {
    btn.addEventListener("click", function() {
        if (!this.classList.contains("disabled")) {
            sendUpdate(this.dataset.id, "key");
        }
    });
});

// CLEAN button
document.querySelectorAll(".toggle-clean").forEach(btn => {
    btn.addEventListener("click", function() {
        if (!this.classList.contains("disabled")) {
            sendUpdate(this.dataset.id, "clean");
        }
    });
});
</script>

{% endblock %}
