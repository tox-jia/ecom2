<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="{% url 'checkin' %}"><h2 style="font-weight:bold;">Hostel</h2></a>

        <!-- --------------------------  -->
        <!-- Navigation: Normal display, screen -->
        <!-- --------------------------  -->
        <div class="" id="">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/checkin/' %}active{% endif %}" href="{% url 'checkin' %}">
                        Check-In
                    </a>
                </li>
                <!-- --------------------------  -->
                <!-- Log in/out & Register  -->
                <!-- --------------------------  -->
                {% if user.is_authenticated == False %}
                <li class="nav-item me-5">
                    <a class="nav-link {% if request.path == '/login/' %}active{% endif %}" href="{% url 'google' %}">
                        Login
                    </a>
                </li>

                <!-- --------------------------  -->
                <!-- logout  -->
                <!-- --------------------------  -->
                <li class="nav-item">
                    <a class="nav-link me-4" href="{% url 'logout' %}">
                        Logout
                    </a>
                </li>
                {% endif %}
                <!-- --------------------------  -->
                <!-- search bar  -->
                <!-- --------------------------  -->
                {% if not user.is_superuser %}
                <li class="nav-item text-center me-2">
                    <form class="pl-2" method="POST" action="{% url 'search' %}">
                        {% csrf_token %}
                        <div class="input-group" style="width: 150px;">
                        <input type="search" class="form-control search-bar" placeholder="Search"
                               style="border-top-left-radius:
                               50px; border-bottom-left-radius: 50px;"
                               name ="searched"
                                >
                        <button class="btn btn-outline-secondary search-bar py-0" type="submit"
                                style="
                                border-top-right-radius: 50px;
                                border-bottom-right-radius: 50px;
                               ">
                          <i class="bi bi-search"></i>
                        </button>
                        </div>
                    </form>
                </li>
                {% endif %}
                <!-- --------------------------  -->
                <!-- End  -->
                <!-- --------------------------  -->
            </ul>

            <!-- END  -->
        </div>
    </div>
</nav>
