{% extends 'hostel/h_base.html' %}
{% block content %}
<div class="container">
    <hr>
    {% for g in guest %}
        <div class="row text-start">
            <div class="col-2 mb-3">{{ g.id }}</div>
            <div class="col-5 mb-3"><b>{{ g.surname }} {{ g.givenname }}</b></div>
            <div class="col-5 mb-3">{{ g.country }}</div>
            <div class="col-2 mb-3">{{ g.platform }}</div>
            <div class="col-5 mb-3">{{ g.start_day }}-{{ g.end_day }}</div>
            <div class="col-5 mb-3">
                {% csrf_token %}
                <select class="form-select form-select-sm room-select"
                    data-guest-id="{{ g.id }}"
                    data-name="{{ g.givenname }}"
                    data-start="{{ g.start_day }}"
                    data-end="{{ g.end_day }}"
                    data-keycard="{{ g.room }}"
                >
                    <option value="">-- Select Room --</option>
                    {% for room in rooms %}
                        <option value="{{ room.id }}"
                            {% if g.room and g.room.id == room.id %}selected{% endif %}>
                            {{ room.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-6 mb-3">
              <img src="{{ g.passport.url }}" width="100%">
            </div>
            <div class="col-6">
              <img src="{{ g.selfie.url }}" width="100%">
            </div>
            <hr>
        </div>
    {% empty %}
        <p>No guests found.</p>
    {% endfor %}
</div>


<br/><br/>


<script>
document.querySelectorAll('.room-select').forEach(select => {
    select.addEventListener('change', function () {
        const guestId = this.dataset.guestId;
        const guestName = this.dataset.name;
        const start = this.dataset.start;
        const end = this.dataset.end;
        const room = this.dataset.room;

        const roomId = this.value;
        const roomName = this.options[this.selectedIndex].text;

        // --- AJAX (your existing logic) ---
        fetch(`/hostel/assign-room/${guestId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: `room_id=${roomId}`
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {

                // --- Determine box + code based on room name ---
                let box = 4;
                let code = "0630";

                if (roomName.startsWith("2-")) {
                    box = 2;
                    code = "0714";
                } else if (roomName.startsWith("3-")) {
                    box = 3;
                    code = "0908";
                }

                // --- Build message ---
                const message = `Plz watch the video to get key card;
----------------------
Room & Box ${box}
lock code: ${code}
----------------------
Key Card: ${roomName};
----------------------
Wifi: Panda_2.4G / 5G
Pass: Panda2024
                `;

                // --- Copy to clipboard ---
                navigator.clipboard.writeText(message)
                    .then(() => {
                        alert("Message copied ✅\n\n" + message);
                    })
                    .catch(() => {
                        alert("Copy failed ❌");
                    });

            } else {
                alert("Error updating room");
            }
        });
    });
});
</script>
{% endblock %}
